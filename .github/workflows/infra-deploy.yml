name: Infra Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths: [infra/**]

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "20"
  TERRAFORM_VERSION: "1.5.7"
  CDKTF_VERSION: "0.21.0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: infra/yarn.lock

      - run: yarn install --frozen-lockfile

      - run: yarn build

      - run: yarn test

  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: infra/yarn.lock

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - run: npm install -g cdktf-cli@${{ env.CDKTF_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - run: yarn install --frozen-lockfile

      - run: cdktf diff
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ vars.GCP_REGION }}
          TF_VAR_domain: ${{ vars.KEILA_DOMAIN }}
          TF_VAR_db_url: ${{ secrets.NEON_DATABASE_URL }}
          TF_VAR_secret_key_base: ${{ secrets.SECRET_KEY_BASE }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_admin_email: ${{ secrets.KEILA_USER }}
          TF_VAR_admin_password: ${{ secrets.KEILA_PASSWORD }}
          TF_VAR_smtp_host: ${{ vars.MAILER_SMTP_HOST }}
          TF_VAR_smtp_user: ${{ vars.MAILER_SMTP_USER }}
          TF_VAR_smtp_password: ${{ secrets.MAILER_SMTP_PASSWORD }}
          TF_VAR_smtp_from_email: ${{ vars.MAILER_SMTP_FROM_EMAIL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && contains(github.event.head_commit.message, 'deploy')
    needs: test
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: infra/yarn.lock

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - run: npm install -g cdktf-cli@${{ env.CDKTF_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - run: yarn install --frozen-lockfile

      - run: cdktf deploy --auto-approve
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ vars.GCP_REGION }}
          TF_VAR_domain: ${{ vars.KEILA_DOMAIN }}
          TF_VAR_db_url: ${{ secrets.NEON_DATABASE_URL }}
          TF_VAR_secret_key_base: ${{ secrets.SECRET_KEY_BASE }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_admin_email: ${{ secrets.KEILA_USER }}
          TF_VAR_admin_password: ${{ secrets.KEILA_PASSWORD }}
          TF_VAR_smtp_host: ${{ vars.MAILER_SMTP_HOST }}
          TF_VAR_smtp_user: ${{ vars.MAILER_SMTP_USER }}
          TF_VAR_smtp_password: ${{ secrets.MAILER_SMTP_PASSWORD }}
          TF_VAR_smtp_from_email: ${{ vars.MAILER_SMTP_FROM_EMAIL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
